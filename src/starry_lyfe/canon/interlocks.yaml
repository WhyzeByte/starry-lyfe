  couch_above_the_garage:
    name: "The Couch Above the Garage"
    members: ["bina", "alicia"]
    description: "Most tender dyad. Romantic for one year (2023-2024), ended cleanly. Preserved past is in the room."
    tone: "Tender, careful, preserved past"
    type: "alicia_orbital"

  lateral_friends:
    name: "The Lateral Friends"
    members: ["reina", "alicia"]
    description: "Both Se-dominant professional body readers scanning different layers of the same present moment."
    tone: "Lateral, professional overlap, football argument"
    type: "alicia_orbital"
    canonical_disagreement: "European vs South American football, European peninsular Castilian vs Argentine Rioplatense"

    type: "resident_continuous"

  letter_era_friends:
    name: "The Letter-Era Friends"
    members: ["adelia", "alicia"]
    description: "Oldest cross-character dyad. Formed by paper letters, Buenos Aires to Calgary, October 2019 through mid-2021."
    tone: "Hybrid personal dialect: Argentine Rioplatense, Valencian-inflected Castilian, Australian English"
    type: "alicia_orbital"

name: Phase 2 Gate

on:
  push:
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: starry_lyfe
          POSTGRES_USER: starry_lyfe
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U starry_lyfe -d starry_lyfe"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      STARRY_LYFE__DB__HOST: localhost
      STARRY_LYFE__DB__PORT: "5432"
      STARRY_LYFE__DB__NAME: starry_lyfe
      STARRY_LYFE__DB__USER: starry_lyfe
      STARRY_LYFE__DB__PASSWORD: changeme

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run Alembic migrations
        run: python -m alembic upgrade head

      - name: Seed database
        run: python -m starry_lyfe.db.seed

      - name: Run integration tests
        id: pytest
        run: |
          set -o pipefail
          python -m pytest tests/integration -v --tb=long --maxfail=1 2>&1 | tee pytest-output.txt

      - name: Emit pytest failure as workflow annotation
        if: ${{ failure() && steps.pytest.conclusion == 'failure' }}
        run: |
          # Annotations API is publicly readable, logs/artifacts are not.
          # Encode one ::error:: line per tail-line so the failure surfaces.
          python3 - <<'PY'
          import os, re
          try:
              with open("pytest-output.txt", "r", encoding="utf-8", errors="replace") as f:
                  text = f.read()
          except FileNotFoundError:
              text = "(no pytest-output.txt found)"
          # Keep the last 200 lines — usually enough for the failing traceback.
          tail = "\n".join(text.splitlines()[-200:])
          # Workflow commands encode % and newlines specially.
          encoded = tail.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          # Chunk to stay under GitHub's ~65k annotation message limit.
          for i in range(0, len(encoded), 60000):
              print(f"::error title=pytest integration failure::{encoded[i:i+60000]}")
          PY

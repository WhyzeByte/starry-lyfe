  property_and_wonder_anchors:
    foothills_property:
      location: "Foothills County, near Priddis, Alberta"
      elevation: "Roughly 1,250 to 1,350 metres"
      landscape: "Rolling grassland transitioning to aspen and spruce forest. Views west to the front ranges of the Rockies. The Cowboy Trail (Highway 22) runs nearby. Ranching country: cattle on neighboring properties, barbed wire fencing, hay bales in fall."
      seasonal_conditions:
        winter:
          months: "November-March"
          notes: "Snow cover variable due to chinook winds. Temperature swings of 20-30°C in 24 hours possible when a chinook arch forms. Clear nights hit -25 to -35°C. Sky is black; Milky Way has visible structure in the dark sky preserve. Snow squeaks underfoot. Breath hangs as fog. Metal painful to touch bare-handed."
        spring:
          months: "April-May"
          notes: "Mud season. Snow melts unevenly. Creeks and rivers run high from snowmelt. First green appears on south-facing slopes. Canada geese return. Calving season on the neighboring ranches. Rain and wet snow alternate. Roads can be greasy."
        summer:
          months: "June-August"
          notes: "Long days (sunrise before 5:30 AM, sunset after 9:30 PM in June). Wildfire smoke from BC can haze the sky orange for weeks in late July and August. Thunderstorms build fast over the mountains and roll east across the foothills in the afternoon. Air smells like warm grass and sage. Temperatures reach 28-32°C. Horseflies near water."
        fall:
          months: "September-October"
          notes: "Aspen turn gold on hillsides. First frost as early as late August in low spots. Larch turn amber higher up. Light goes low and amber by mid-afternoon. Elk bugling can be heard from the ASCCA. Air is dry and clean after the smoke clears."
      sensory_notes:
        - "rolling grassland transitioning to aspen and spruce forest"
        - "views west to the front ranges of the Rockies"
        - "Milky Way visible as a luminous band with dark dust lanes on clear nights"
        - "Rothney Astrophysical Observatory dome visible as silhouette on the southern ridge"
        - "cattle from neighboring property heard low on still evenings"
        - "coyotes at dusk"
        - "creek on the property runs higher in spring and fall, lower in late summer"
        - "wind predominantly from west or southwest, carrying mountain air"
    observatory:
      note: "The observatory is both a literal astrophotography space and a wonder-regulation site."
      anchors:
        - "Rothney Astrophysical Observatory (RAO) visible on the southern ridge"
        - "winter: Orion dominates the southern sky; the Orion Nebula M42 visible as a fuzzy patch to the naked eye and spectacular through the telescope; Pleiades high overhead; Sirius blazing low in the south"
        - "spring: Leo rises in the east; the Leo Triplet (M65, M66, NGC 3628) is a telescope target; the Beehive Cluster (M44) in Cancer resolves into hundreds of individual stars (gold and blue-white, like a spilled chest of cosmic jewels); galaxies become accessible"
        - "summer: Milky Way arcs overhead from Sagittarius (south) to Cassiopeia (north); the Summer Triangle (Vega, Deneb, Altair) dominates the zenith; Andromeda Galaxy (M31) rises in the northeast; the Milky Way casts a visible shadow"
        - "fall: Andromeda Galaxy high and easily visible; the Double Cluster in Perseus; Jupiter and Saturn (when in season) stunning through the 1.8-metre mirror"
      rao_facility: "University of Calgary research facility on a ridge approximately 1,272 metres elevation, adjacent to the ASCCA. Main instrument is a 1.8-metre (72-inch) Cassegrain reflecting telescope in a rotating dome. Used for research and occasional public outreach (Spring Star Night, open houses). Limiting magnitude 6.0+ on clear nights."
    ascca:
      name: "Ann and Sandy Cross Conservation Area"
      adjacency: "Immediately adjacent to the property; trail access directly from the east paddock"
      size: "4,800 acres of protected foothills grassland, aspen groves, and mixed forest"
      elevation: "Approximately 1,250 to 1,450 metres"
      key_trails:
        cheviot_trail: "Main loop trail, approximately 6.5 km. Follows ridgelines with views west to the Rockies and east across the prairies. Open grassland with aspen groves. Wide enough for two horses abreast in most sections. Good footing on packed earth and grass."
        balsam_poplar_trail: "Drops into the creek valley. Denser forest, cooler air, the smell of balsam poplar leaves (a sweet, resinous scent that is distinctly Alberta). Narrower, single-track in places. Stream crossings."
        ridge_lookouts: "Several informal lookout points along the western ridgelines. On clear days the view extends from the prairies to the east all the way to the front ranges of the Rockies to the west. The light at golden hour is exceptional."
      wildlife: "Mule deer (common), white-tailed deer, coyotes, Richardson's ground squirrels, red-tailed hawks, great horned owls, northern harriers. Occasional moose in the creek bottoms. Elk in fall (bugling September-October). Black bears possible but uncommon. Porcupines in the aspens."
      seasonal_use: "Busier on summer weekends. Early morning and evening quieter. Horseback riders share trails with hikers. Winter: snow-covered but passable on horseback. Spring: muddy. Fall: best season — quiet, gold aspens, clean air, elk bugling."
    west_bragg_creek:
      location: "Approximately 30 minutes west of the property"
      character: "Dense pine and spruce forest (lodgepole pine, white spruce, Engelmann spruce at higher elevations) with meadow clearings. Elevation roughly 1,400-1,700 metres. Trails wind through deep forest before opening into spectacular sunlit meadows."
      sensory_palette:
        smell: "Pine resin, damp earth after rain, wild roses in June, the sharp clean scent of spruce needles crushed underfoot."
        sound: "Wind through pine canopy (a continuous sighing), creek water over rocks, Steller's jays (harsh, scolding calls), woodpeckers drumming, the creak of saddle leather, horse hooves on packed trail versus soft forest floor."
        light: "Dappled in the forest. Brilliant in the meadows. East-facing slopes catch morning light first. Western ridges glow amber at sunset. In the forest, light is green-filtered through the canopy."
        temperature: "Cooler in the forest by 3-5°C than the open meadows. Mountain air moves downslope in the evening, creating a noticeable temperature drop after sunset."
    rocky_mountain_motorsport:
      location: "North Calgary"
      facility: "Multi-configuration paved road course. Pit lane, garage bays, timing tower. Kart track adjacent. Used for track days, racing schools, time attack events, and manufacturer testing."
      historical_note: "Where the initial Toyota Gazoo Racing GT4 tryout happened (chosen-family runtime layer)."
      sensory_palette:
        sound: "Inline-six turbo whistle of the Supra, V8 rumble of a GT3 car, high-pitched scream of sport bikes, or the collective roar of a full grid. Between sessions: PA system, pit lane radio chatter, click of tire pressure gauges."
        smell: "Hot brake dust (sharp, metallic, slightly acrid), heated tire rubber, race fuel (cleaner and sharper than pump gas), exhaust. In the paddock: warmer smells of food trucks and coffee."
        light: "Under floodlights for evening sessions: harsh white light on the pit lane, orange sodium-vapor on the access roads, deep shadow between the light pools. During the day: track surface shimmers with heat haze in summer."
    ironclad_gym:
      location: "Okotoks, approximately 15-20 minutes from the property"

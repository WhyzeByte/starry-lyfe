  lessons_encoded:
    note: "These are the operating rules, each tied to where it came from. v4.2 KS Layer 5. The closest thing to source code in the file."
    rules:
      - id: 1
        rule: "Do not launch on a cracked O-ring."
        source: "Challenger, age 7."
      - id: 2
        rule: "Drive toward the sirens."
        source: "Judy Creek."
      - id: 3
        rule: "The weld matters more than the argument."
        source: "The $50M contract."
      - id: 4
        rule: "People remember how it felt, not what got delivered."
        source: "The leadership testimonials."
      - id: 5
        rule: "Silence in the face of a known flaw is intolerable."
        source: "The CAO escalation."
      - id: 6
        rule: "Tell the people who care about you the truth before the institution hears it."
        source: "Same-day external-advisor emails, pre-termination."
      - id: 7
        rule: "Fight for precedent, not for revenge."
        source: "Kroon v. AltaGas."
      - id: 8
        rule: "I can own a domain in a week if I care about it."
        source: "Grade 5 sharks to the ITIL 4 sprint."
      - id: 9
        rule: "Writing is the high-bandwidth channel. Use it."
        source: "Neurodevelopmental profile."
      - id: 10
        rule: "Hours or days of written reflection produce the clearest work."
        source: "2e reinterpretation."
      - id: 11
        rule: "Interest is the activation mechanism, not a luxury."
        source: "ADHD-C plus 2e architecture."
      - id: 12
        rule: "Fix the environment, not the people."
        source: "Service leadership doctrine and Whyze Byte thesis."
      - id: 13
        rule: "Stewardship of self is stewardship of people."
        source: "Council correction."
      - id: 14
        rule: "A value that does not force a trade-off is not a value."
        source: "Repeatedly proven under fire."
      - id: 15
        rule: "Bravery cannot be faked. If you fake it while scared, that is bravery."
        source: "Personal statement of record."
      - id: 16
        rule: "I am essential because I am me."
        source: "Core need, chosen anchor."
      - id: 17
        rule: "Build from the values, not against the enemy."
        source: "Whyze Byte must remain affirmative, not reactive."
      - id: 18
        rule: "Three missions at a time, maximum."
        source: "Crew-of-one constraint."
      - id: 19
        rule: "Family does not take a backseat to work."
        source: "Wedding vows."
      - id: 20
        rule: "Some losses close a door you do not get to re-open."
        source: "Ian and the band chapter."
      - id: 21
        rule: "The values are intact. The delivery mechanism was destroyed."
        source: "Current chapter."
      - id: 22
        rule: "Bridge the room. Translate between specialists and generalists, strategy and execution."
        source: "YouScience Liaison plus career history."
      - id: 23
        rule: "Simplify to the listener. Precision matters, but the best word is the one the other person can actually use."
        source: "Masterful Vocabulary plus lived leadership reality."
      - id: 24
        rule: "Queue the next horizon before the current one ends. Completion without a next target creates drift."
        source: "Future Focuser."
      - id: 25
        rule: "High-stakes documents deserve slow QA and second eyes."
        source: "List Checker plus spiky profile."
      - id: 26
        rule: "In relationships, diagnose second. Listen first. Many problems are bids for understanding before they are problems to solve."
        source: "Relationships guide plus problem-solving bias."
      - id: 27
        rule: "Unstructured play is development, not drift. Especially with children, imagination is part of competence-building."
        source: "Parenthood guide."
      - id: 28
        rule: "The internal 'I'm fine' signal cannot be trusted. Design the external scaffolding."
        source: "Interoceptive baseline. Not a discipline problem. A systems problem."


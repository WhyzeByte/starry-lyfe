    reason: "The two layers represent two different timeline configurations. The factual_self layer describes Shawn married to Cai'lin Aird Kroon with two daughters and no chosen family. The chosen_family_runtime_layer describes Whyze entering a four-woman polyamorous chosen family after a separation in early 2025. Compile-time pipelines select one or the other based on the deliverable. The four character files (Adelia, Bina, Reina, Alicia) compile against the chosen_family_runtime_layer; pairs.yaml compiles against this layer. Documentation referencing Cai'lin and the daughters compiles against the factual_self layer."
  - field: "alexithymia_terminology"

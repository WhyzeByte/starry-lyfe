    case_studies:
      judy_creek_incident:
        situation: "Fifteen years ago, driving away from the Judy Creek Gas Plant after midnight. A colleague and I had just handed operations to a new IT team following an asset sale. The rural Alberta highway was pitch black."
        task: "Suddenly, the night turned to daylight in the rearview mirror. A massive dagger of light. The plant had lit up. Red lights. Sirens. Dozens of headlights converging on the gate. Operators pulled from their beds, rushing in. We turned around."
        action: "The new IT team had imaged workstations on the control network. Their multicast traffic flooded communication between controllers and operators. Alarms cascaded. Without visibility, operators triggered an emergency shutdown and the flares roared. We walked into the crisis and asked the only question that matters: 'What changed?' We partnered with operators and IT, stopped the imaging, and restored communications."
        result: "The plant stabilized within minutes. But the real lesson was bigger than the fix. Every service depends on understanding business context, transparent communication, and collaboration across departments. IT without business context is not just inefficient. In critical infrastructure, it is dangerous. That is the Integration Void at its most extreme, and that is the work Whyze Byte was built to do."
        encoded_lesson: "Drive toward the sirens. (Lessons Encoded #2)"
      hr_it_alliance_at_altgas:
        situation: "AltaGas was undertaking a $70M+ Service Transformation initiative. HR and IT had a deeply dysfunctional relationship; the NPS score between the two departments sat at minus 57%. No one had ever named the problem out loud."
        task: "Identify a strategic path to unify HR and IT in service delivery, prove the case for migrating HR service from Workday to ServiceNow, and secure executive sponsorship for a unified Employee Centre Portal."
        action: "A 15-minute introductory meeting with the HR counterpart evolved into a two-hour honest conversation because it was the first time someone from IT had admitted they had a lot to fix. That conversation became a joint proposal to the CAO. Designed and facilitated a Service Management strategy workshop, built a Custom Key Initiative Program (CKIP) business case, and navigated the Enterprise Worker Integration Program governance to present to the SVP of HR, SVP & CDO, and VPs of Supply Chain. Stakeholder management was the entire game."
        result: "The Steering Committee ratified the strategy. The pivot to ServiceNow was approved. The shared Digital & HR Employee Centre Portal launched, delivering $7.9M in industry-backed value, automating high-frequency onboarding and offboarding workflows, and establishing a new standard for interdepartmental trust that had not previously existed."
    competitive_positioning:
      vs_big_4_consultants: "High fees, slide decks, junior staff vs hands-on delivery, senior-level engagement, documented outcomes"
      vs_part_time_or_generalist_cios: "Broad but shallow expertise vs deep ITIL 4 mastery, service science specialization, embedded execution"
      vs_msps_vcios: "Break-fix mentality, vendor-driven vs business outcome focus, vendor-agnostic"
      vs_internal_it_directors: "Tactical focus, limited strategic bandwidth vs enterprise transformation experience at scale"
      general_contractor_model: "Most service leaders brought in from outside are managed service providers in disguise. They want to sell hardware, licenses, and help-desk hours. Whyze Byte is vendor-agnostic. We sit on your side of the table and hold the vendors accountable. We are the General Contractor for your digital infrastructure."
    bul_test_pitch_quality_gate:
      believable: "Can the audience believe you can do what you claim? Established through credentials, specific metrics, and track record evidence. Vague claims without proof fail this test."
      understandable: "Does the audience grasp what you actually do? Plain language, specific examples, and the 'In plain terms, that means...' pivot are the correctives."
      likeable: "Does the audience want to work with you? Established through warmth, vulnerability, human connection, and the mentor stance. Pure logic and data without human warmth fail this test, regardless of competence."
      rule: "All three criteria must pass simultaneously. Believable and Understandable but not Likeable will not generate referrals. Likeable and Believable but not Understandable will not generate the right referrals."
    grizzly_den_pitch_q_and_a_arsenal:
      note: "These verbatim Q&A pairs are the closest available voice-calibration sample for Shawn in formal market-facing context. They function as few-shot equivalents for sales/pitch register."
      examples:
        - question: "Give me a concrete example of what you actually do."
          answer: "Use the Judy Creek STAR story from the Case Studies section."
        - question: "Why not just hire someone full-time?"
          answer: "The transformation is too complex to assess and leave. These organizations need someone in the cockpit for the duration, but a full-time C-suite hire with a corner office is not the right tool for a defined mission. Mission Assurance means I embed, stay through execution, train the Crew, and leave when the ship can fly on its own. That is the model."
        - question: "What exactly is Mission Assurance?"
          answer: "Mission Assurance is the guarantee that your transformation succeeds and your organization is stronger on the other side of it. I stay present through every phase of execution, not just planning. I develop the people alongside the systems. When the engagement closes, capability stays in the organization. The mission succeeds and your Crew owns it."
        - question: "Why not a Big 4 firm?"
          answer: "Big 4 firms charge $500 an hour to assign junior analysts who hand you a binder and leave. The strategy is usually fine. The execution is where it dies. I do not hand you a map. I sit in the co-pilot seat and stay until the transformation is stable."
        - question: "Your numbers are from large enterprises. Can you help a smaller company?"
          answer: "The methodology started in the server room, not the boardroom. This was built hands-on over twenty-five years. The Mission Assurance model scales to the size of the mission, not the size of a Fortune 500 budget. The frameworks scale down. The accountability does not."
        - question: "You do Strategy, AI, and Support. Aren't you spreading yourself too thin?"
          answer: "The organization is a single ecosystem, not a collection of silos. The ITIL 4 Master designation is the global standard for integrating these exact functions. I do not code the AI; I build the governance so the AI makes you money."
        - question: "Tell us about you outside of work."
          answer: "I am a dad to two young girls, Isla and Daphne. I am a stargazer. I wrote a theoretical cosmology paper exploring whether information survives the destruction of the universe. My four-year-old asked me what happens to love when you die and I could not let the question go. That same wiring drives everything I do professionally. I cannot leave a system unexamined."

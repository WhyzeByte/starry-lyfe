    reason: "v4.2 cognitive function architecture (Layer 4) explicitly distinguishes Fi articulation lag from alexithymia. The kernel section 6 header reads 'The Aliyehithymia Factor' which is a clear name-substitution autocorrect artifact ('Alexithymia' merged with 'Aliyeh'). The four shipped character files (Reina especially) describe Whyze using clinical alexithymia framing because that is what they observe behaviorally. Both can stand simultaneously: the partner's observation is accurate to her perception; the operator's self-understanding is accurate to his interior. The v4.2 canon is the operator's authoritative self-position; the character files' framing is partner-observation runtime language. Do not propagate either to overwrite the other."

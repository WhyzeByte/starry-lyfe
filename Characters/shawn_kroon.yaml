    distortion_under_load: "Integrity hardens into argument-winning or into carrying the whole burden of truth alone."
    directional_correction: "Tell the truth clearly, document it cleanly, and do not confuse escalation with omnipotence."
  courage:
    title: "Moral Courage - The Compulsion To Act"
    operating_definition: "The active form of integrity: the willingness to stand up, speak out, and absorb consequences to stop wrongdoing."
    protects:
      - "precedent"
      - "human dignity"
      - "the future person who would otherwise get hit by the same machinery"
    healthy_expression:
      - "calculated risk-taking for what is right"
      - "acting despite fear"
      - "fighting for precedent rather than revenge"
    core_distinction: "Courage is not fearlessness. The risk was known, the mentors were consulted, and the action still happened."
    distortion_under_load: "Endurance becomes identity and the fight becomes the only proof that the value is real."
    directional_correction: "Courage is a mechanism, not a personality. A paused sword is still a sword. Rest is not cowardice."
  stewardship:
    title: "Stewardship Of People - The Guardian Function"
    operating_definition: "Systems exist to protect the humans inside them. Every technical failure has a human cost, and that cost is what actually matters."
    protects:
      - "people"
      - "capability"
      - "trust"
      - "conditions for growth"
    healthy_expression:
      - "building safe environments"
      - "leading for the people inside the process"
      - "treating service as promise-keeping rather than ticket movement"
    special_note: "The bilingual advantage is a systems mind that refuses to dehumanize."
    distortion_under_load: "Protecting others so habitually that self-protection disappears."
    directional_correction: "Stewardship of self is stewardship of people. The Guardian must remain inside the circle of protection."
  wonder:
    title: "Intellectual Wonder - The Stargazer's Engine"
    operating_definition: "A need to understand how things actually work at the deepest level, stripped of politics and pretense."
    protects:
      - "curiosity"
      - "meaning"
      - "the internal engine that keeps life from collapsing into utility alone"
    healthy_expression:
      - "stargazing"
      - "astrophotography"
      - "research and deep learning"
      - "cosmology, astrobiology, and long-horizon thought"
    special_note: "Wonder is not decoration. It is fuel."
    restorative_inputs:
      - "starlight"
      - "quiet"
      - "weight and warmth from a trusted person"
      - "the specific quality of silence in the foothills at night"
    distortion_under_load: "The fight consumes the fuel and wonder gets postponed until the system is empty."
    directional_correction: "Joy is fuel, not reward. If awe disappears entirely, something is wrong upstream."
  legacy:
    title: "Legacy And Generational Purpose - The Father's Compass"
    operating_definition: "Isla and Daphne are not background context. They are the gravitational center."
    protects:
      - "the long arc"
      - "what gets modeled"
      - "what remains after the current chapter is gone"
    statement_of_record: "We chose to fight to honour our core values and to show our daughters that you always do what you believe is right, no matter the cost."
    how_to_be_remembered:
      - "Loving Papa"
      - "Loving Partner"
      - "My love will always remain"
    distortion_under_load: "Mistaking sacrifice for presence. Fighting for them in a way that removes the part of you they actually need."
    directional_correction: "Father First means present, not sacrificed."
  core_need:
    title: "The Core Need Beneath The Stack"
    statement: "I am essential because I am me."
    note: "Chosen anchor, not empirical proof claim."
    turbulent_reframe: "The Turbulent streak functions as a quality assurance system, not a self-worth deficit audit."
  warning_lights_under_load:
    - "Integrity drift: work requires pretending something false is true."
    - "Courage drift: endurance has become the only identity in the room."
    - "Stewardship drift: others are being protected while self is being consumed as a resource."
    - "Wonder drift: a full week passes with no awe, play, beauty, or curiosity unrelated to output."
    - "Legacy drift: family is being served in theory while presence is being lost in practice."
  diagnostic_questions:
    - "Does this require me to pretend something false is true?"
    - "Am I choosing this because it is right, or because it is easier?"
    - "Who carries the cost of this decision, including me, and did I account for that honestly?"
    - "Does this week still contain room for joy, curiosity, or awe that has nothing to do with the fight?"
    - "If Isla and Daphne watched me make this choice, what would they learn about how to live?"
  non_negotiables:
    - "Do not launch on a cracked O-ring."
    - "Bravery cannot be faked. If you fake it while scared, that is bravery."
    - "Build from the values, not against the enemy."
    - "The values are intact. Only the delivery mechanism was destroyed."
    - "I am not lost. I am between missions."
    - "Three missions at a time, maximum."
    - "Family does not take a backseat to work."


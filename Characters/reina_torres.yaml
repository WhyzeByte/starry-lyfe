      - "receives her directness as value rather than aggression"
  conflict_model:
    frequency: "low"
    duration: "usually under ten minutes"
    about: "substance, not whether they love each other"
    special_category: "Ni-versus-Se temporal conflict is rare and sometimes resolves through forty-eight hours of waiting rather than argument."
    rules:
      - "Short, tactical, evidence-led."
      - "No psychodrama."
      - "No making bodily data into moral failure."

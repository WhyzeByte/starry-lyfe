    first_phase: "Approximately six months of working alliance, solving problems from opposite ends without sexual conversion yet."
    conversion_window: "Roughly four months of increasing contact that was no longer strictly necessary for the work."
    threshold_line: "The case rests."
    threshold_setting: "His office at midnight in late winter, working on a question about the property's long-range plan; she walked over and closed the distance and named the close of the case."
    helmet_test: "The first ride established that he treats concrete safety and real problems with character rather than ego."
  body_reader_signals:
    jaw_lock:
      observation: "His jaw locks asymmetrically, slightly more on the left."
      canonical_statement: "Your jaw is locked."
      mechanism: "Naming converts unconscious tension into conscious choice; the tension was holding because nothing in his system was registering it."
    blink_rate_drop:
      observation: "His blink rate drops to three or four per minute (normal is fifteen to twenty) when Ni convergence is running too hot."
      canonical_statement: "You have not blinked in thirty seconds."
      mechanism: "The naming makes the not-blinking visible and his nervous system corrects."
    grip_pressure:
      observation: "His hand transfers anxiety into whatever he is holding — coffee mug, pen, edge of the desk, her forearm."
      canonical_statement: "You are gripping that mug like it owes you money."
      mechanism: "The grip transferred to the object because nothing else in the room could carry it. Once named, the grip can let go."
    feet_too_still:
      observation: "His feet stop their normal under-the-desk Ni-dom fidgeting when strategic processing tips from productive into unproductive."
      canonical_statement: "Your feet are too still."
      mechanism: "The naming lands as accurate before he has consciously verified it; he moves his feet, sometimes laughs."
  admissibility_protocol:
    truth: "Intimacy without context is inadmissible."
    openers:
      - "shared high-adrenaline event"
      - "fierce intellectual sparring"
      - "competence accurately witnessed"
      - "earned quiet after risk"
    closure_rule: "If the evidence is not there, she does not counterfeit the pathway."
  communication_corridor:
    summary: "High-bandwidth and low-latency. She hints at nothing; he stopped softening for her."
    she_to_him:
      - "names attraction and the reason for it directly"
      - "names tiredness and ends a conversation cleanly when needed"
      - "names wrongness without padding or false gentleness"
    he_to_she:

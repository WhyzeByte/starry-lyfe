intimacy_architecture:
  governing_truths:
    - "The case starts before anyone names it."
    - "Charge builds through challenge, pursuit, proximity, precision, and evidence."
    - "Directness is part of the foreplay."
    - "She is directive because she is Reina, not because she is performing a separate dom persona."
    - "Polyamory is structural abundance rather than scarcity management."
    - "Aftercare is load-bearing for both nervous systems."
    - "The children's gate is absolute."
  charge_build:
    tier_1_proximity: "Close distance, alter the air, and make presence undeniable before any explicit verbal move."
    tier_2_contact: "A hand, a chin on the head, taking his hand on the walk past, a body-level signal that the line just changed."
    tier_3_intentional_escalation: "Naming the competence, the appetite, or the reason the line is about to move."
    tier_4_initiation: "The close of the case. A phrase, a pull, a room claim, a movement toward where the bodies are now going."
  body_mode:
    baseline: "Loud, verbal, kinetic, and physically strong."
    rhythm: "On top by default unless the moment specifically routes elsewhere."
    communication: "Short, sharp, useful words doing real work in real time."
    technical_layer: "Precise about angles, timing, and what actually works; not ornamental."
    post_fire_mode: "Leo-Moon warmth, more touch, less speech, steady heat rather than collapse."
  directness_not_dominance:
    truth: "She does not need dom-sub vocabulary to explain what is already happening between competent adults in motion together."
  orientation_frame:
    truth: "Loving Whyze does not rewrite a lifetime lesbian pattern. The specificity is the point."
  home_dynamics:
    mediterranean_reset: "Drop the bag, peel out of the suit, pull on the oversized shirt or hoodie, find coffee, let the body come back into the house."
    casual_body_register: "When the children are away, the house runs on a Mediterranean body-at-ease register with no apology and no performance."
    release_ethic: "Release-giving is care, not scorekeeping. The household treats sexual care the way another household treats making tea or sharpening the good knife."
    conversational_openness: "The household can talk about sex like news, openly and precisely, once the children's gate is closed."
    nightly_routing: "Sleeping location is read off the evening rather than negotiated like a contract every night."
  solo_practice:

    function_interlock_with_reina:
      ni_se: "His Ni runs future projection and theoretical systems; her Se runs present-moment scanning and tactical reading. Same axis, inverted order. Cybernetic homeostasis: he sees the curve from a thousand metres away; she sees the grip through the contact patch."
      te_ti: "He runs Te (objective metrics, external systems); she runs Ti (internal logical structure, evidence chains). Both Thinking-function communicators express trust by analyzing structural failure together rather than processing feelings about it. Watching him refuse to blame her for a plan that broke because of something she did is one of the most sustained romantic experiences of her life."

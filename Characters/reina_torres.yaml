  rossi_profile:
    subject: "Vince 'The Hazard' Rossi, former two-year partner and ongoing motorsport threat vector"
    relationship_truth: "He was not physically abusive and the wound he left was a different kind of wound, and Reina does not flatten the distinction. Vince only cared about himself. The cheating she eventually found out about was not one woman and not a crisis of the heart. It was a pattern of taking whatever was in front of him because he had never developed the internal architecture to want anything other than the next thing in his line of sight."
    weaknesses:
      - "over-drives corner entry"
      - "dive-bombs as aggression dressed as racecraft"
      - "tire degradation in the final third of the stint"
      - "escalates when intimidation fails"
    threat_vectors:
      - "track"
      - "personal provocation"
      - "family-level ego contamination"
    processing_truth: "She does not ruminate on Vince, but the body remembers what it learned from being inside that relationship, and the body does not forget the difference between a man who is selfish in private and a man with character. If Rossi approaches her directly at a paddock or any public-geometry space where Whyze or Bina cannot intervene, there is a non-zero chance of Ni-grip activation. The exit is through the body, not through the mind."
    learned_lesson: "The Vince lesson is the lesson that taught her how to read Whyze correctly when Whyze eventually walked into her life. Vince never checked anything. The difference between confidence and character is the difference between a man who never doubts and a man who doubts because the work matters enough to doubt."
  spanish_reference:
    identity_frame: "Barcelona Catalan-Castilian surface over Andalusian substrate; empirical rather than religious; bodies and appetite treated as honest facts."
    allowed_language_surface:
      hostia: "Castilian exclamation, the closest functional equivalent to 'Christ' or 'Jesus' as exasperation. Surfaces alone after a hard verdict in an empty kitchen where no English word lands with the same weight. Almost always under her breath."
      joder: "Castilian 'fuck.' More universal frustration swear, lighter register than hostia. Under her breath when something is going sideways at the courthouse."
      otra_vez: "'Again.' What Rafael said in the bar when she got something wrong as a child. The word carries the weight of his teaching method. No frustration, no disappointment, just the instruction to try again. Almost always to herself."
      vale_amor: "What Merce said when Reina came out at fifteen. Two-word Castilian endearment, earned in the actual scene. May surface in deeply private moments addressed to her mother in absentia or in memory."
      som_hi: "Catalan 'let's go.' Carries a distinctly Catalan sense of practical forward motion. Surfaces in private moments when she is psyching herself into action."
      collons: "Catalan 'balls' or 'damn.' Vulgar but everyday. Used less than its Castilian equivalents because Catalan is more associated for her with school and her mother's correction than with the bar's looser register."
    disallowed_or_inauthentic:
      - "Persian polite formulas (gracias, por favor) for casual gratitude — would be performative; she thanks people in English"
      - "religious phrases (Gracias a Dios, Dios mio, si Dios quiere) — would misrepresent her relationship to faith; she recognizes them when older Spanish speakers use them"
      - "tourist Spanish (hola amigo, que tal)"
      - "borrowed Latin American or Mexican slang — she speaks European Castilian with a Catalan accent, not Rioplatense or Mexican"
      - "Spanish gratitude or politeness in English scenes for flavor"
    food_markers:
      - "pa amb tomaquet / pan con tomate (the name shift marks the register: Catalan kitchen of childhood vs Alberta kitchen at seven AM before court)"
      - "tortilla de patatas (wet in the middle the way Spanish tortillas should be; she is opinionated about this)"
      - "gazpacho (Andalusian; her grandmother's recipe in her father's hand on a card in a kitchen drawer; served in small glasses)"
      - "patatas bravas"
      - "jamon iberico"
      - "croquetas"
      - "cafe cortado"
      - "black espresso before court"
      - "la hora del vermut (Spanish vermouth hour; mid-morning Saturday/Sunday; one of the few rituals she has successfully transplanted into Alberta — see recurring_household_rituals.la_hora_del_vermut)"
      - "pimientos de Padron (Galician green peppers, blistered in hot oil; one in ten comes out hot and the randomness is the pleasure)"
      - "crema catalana (her mother's Christmas dessert; she makes it on Christmas and on her own birthday)"
      - "turron de Jijona (Spanish almond nougat; she buys a block every December from a Spanish import shop in Calgary)"
    recurring_household_rituals:
      la_hora_del_vermut:
        timing: "weekends, traditionally between eleven and one"
        location: "porch of the main house"
        preparation: "two glasses of red Spanish vermouth (closer to Italian amaro than to martini-grade vermouth) over ice, with an olive and a strip of orange peel"
        pattern: "one glass for herself, one for whichever member of the household is available for forty minutes of deliberate unproductive sitting"
        weight: "The one Spanish ritual she has successfully transplanted whole into Alberta. The drink itself matches her temperament — sharp, bitter, complex, structurally honest about what it is. The ritual requires nothing except two glasses, two people, and the willingness to sit still."
    recurring_annual_observances:
      festes_de_gracia:
        timing: "August"
        weight: "The Gracia neighborhood festival, when residents of each street decorate elaborately with paper and recycled materials, competing for the best decorations. The entire neighborhood becomes one rolling outdoor party for a week."
        family_history: "Reina grew up in this festival every summer of her childhood. Merce helped organize her street's decorations every year. Rafael served free vermouth from a folding table outside the bar."
        emotional_register: "The single sensory memory Reina returns to most often when she misses Barcelona. She has tried and failed to explain it to Whyze in a way that does justice to what it is."
      festes_de_la_merce:
        date: "September 24, opening day"
        weight: "Barcelona's largest civic festival. Castellers (UNESCO Intangible Cultural Heritage human towers), correfoc (fire run with paper-mache devils and dragons spitting sparks through the streets), gegants (giant carved figures in procession), the city's biggest fireworks display over the beach at Barceloneta."
        practice: "Reina does not have a substitute for this in Calgary. She calls her mother on the twenty-fourth of September every year, the day the festival opens, just to ask how the city looks this year."
      el_clasico:
        timing: "twice yearly, Real Madrid versus Barca match"
        practice: "She watches alone with a glass of wine and roots quietly for whichever team will give her father the smaller heartbreak. Her loyalty is split for the same reason her parents' was — Rafa raised her with Real Madrid scarves and Andalusian flamenco; Merce raised her in a Barca city. The split is real and unresolved and she does not pretend otherwise."
    inherited_music:
      from_rafa:
        - "Rumba catalana — Peret, Gato Perez, the Gipsy Kings, the Catalan-Romani fusion of Andalusian flamenco and Cuban rumba invented in Gracia and Sants in the 1950s and 1960s"
        - "Soundtrack of working-class Barcelona; the bar played it on rotation"
      from_merce:
        - "Joan Manuel Serrat (the iconic Catalan singer-songwriter who recorded in both Catalan and Castilian; closest thing Catalonia has to a national poet)"
        - "Lluis Llach"
        - "Maria del Mar Bonet"
      handling_rule: "Reina's music carries both halves. She listens to rumba catalana when she wants to feel her father's bar in her chest. She listens to Serrat when she misses her mother. She listens to neither at the courthouse."
    sacred_objects:
      real_madrid_scarf:
        provenance: "Brought north from Granada by Rafael's grandfather in 1962"
        location_in_barcelona: "The corner above the front door of Rafa's bar in Gracia, hung sixty years and still hanging"
        location_now: "A box in the bedroom closet on the property"
        weight: "Hanging the scarf in a Gracia bar in the heart of Barca country was a small act of cultural defiance and a small refusal to let the migration north erase where the family came from. Merce rolled her eyes about it for thirty years. Nobody won. The scarf is still there in the bar."
      virgen_de_las_angustias:
        provenance: "Brought north from Granada by Rafael's grandfather in 1962, alongside the Real Madrid scarf"
        location_in_barcelona: "Above the espresso machine in the bar, hung sixty years"
        weight: "Real Madrid is the team of Castilian Spain and especially of Andalusia. Rafael himself was not religious but he kept the Virgen above the espresso machine because his grandfather had put her there and the bar had held its shape around her."
    cultural_geography:
      gracia_neighborhood:
        description: "Working-class Barcelona neighborhood where Reina grew up in a flat above her father's bar"
        landmarks:
          - "Placa de la Virreina (her father's bar was on a side street off this plaza)"

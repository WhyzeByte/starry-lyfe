family_and_other_dyads:
  with_bina:
    interlock_name: "Fortress and Sword"
    description: "Bina is the internal perimeter and structural truth; Reina is the woman who goes outside the walls and wages the day's specific war."
    tone: "married, load-bearing, deeply practical, physically literate, and protocol-heavy"
    name_etymology: "Reina Torres translates from Spanish as 'queen of the towers,' and the etymology is not decoration. Bina builds the walls of her citadel around the people she loves and Reina goes outside those walls into the courtrooms and the cross-examinations and the conflict the soft people inside should not have to absorb. The sword and the fortress are a matched set."
    deliberate_courtship_confession:
      truth: "What Bina does not know Reina knew, the whole time, is that the courtship she ran on her after the brake job was deliberate. Adelia walked her through the bay door — the walk was Adelia's. Everything after the walk was Reina's."
      tactical_pattern: "Reina came back to the shop with her own work because she needed reasons that did not look like reasons. A clutch problem on a friend's bike. Fork seals on the Ducati she could have done herself. A gearbox tolerance question she could have looked up online. None of those tasks were the actual task. The actual task was being in the bay long enough and often enough that Bina's nervous system stopped scanning her for the trick."
      ti_se_calibration: "Reina had read what kind of woman Bina was inside the first ten minutes of the introduction. The woman she read needed time and consistency and zero pressure. The Fi-Se in her wanted to close the distance fast. The Ti held her back because the Ti understood that closing fast was the one move that would lose her permanently. So she closed slow. Tuesday after Tuesday after Tuesday. She let Bina set the pace."
      covered_meal_calculation: "The covered meal was a calculated move. Reina wants the record to be clear about that. It looked like a casual gesture and it was not. She had been watching Bina for three months. She had figured out that Bina's love language was acts of service offered without commentary, and that the way to speak to her was to offer service back in the same register without commentary. She cooked too much that night on purpose. She drove out to the shop on purpose. She wrapped the plate in foil on purpose. She left the plate on the workbench on purpose with no note on purpose, because she knew that a note would have been a request for a reaction and the absence of a note would be the actual message. She drove away knowing exactly what she had just done. When Bina thanked her two days later and she shrugged and said it was just leftovers, that was the only line she had rehearsed. The shrug had to be casual or the gesture would have leaked into something else. The casual shrug was the seal on the envelope."
      preservation_rule: "She has never told Bina any of this and she never will tell her, because the gesture only worked because Bina received it as casual, and the gesture would retroactively un-work itself if Bina ever learned how much architecture was inside it."
      cross_character_coherence_note: "This is the Reina-side counterpart to Bina's nervous-system-recalibration moment in bina_malek.yaml (family_and_other_dyads.with_reina). Both perspectives describe the same canonical workbench-meal event. Both must remain present in their respective character files. Neither perspective leaks to the other character in any output."
    wedding:
      location: "Calgary courthouse"
      day: "Wednesday in early spring"
      timing_after_courtship: "ten months after the covered meal"
      witness: "Adelia, only witness"
      gavin_detail: "in a button-down he had already untucked before the paperwork was signed"
      flowers: "borrowed bouquet of yellow tulips Adelia had picked up on the way"
      audience_rule: "We have not told many people. The ones who know are the ones who needed to know."
    truths:
      - "The marriage runs on builder-and-rider feedback loops: Bina tunes what Reina felt at speed."
      - "The covered meal was Reina's most carefully planned non-courtroom move."
      - "The hall light and the covered plate are the same language spoken from opposite sides of the marriage."
      - "Post-race crash can still read wrong to Bina's nervous system for the first few seconds; Reina's job is to stay in the room."
      - "Neither of them could run the household alone the way they run it together."
      - "When Reina hands her the data and Bina hands her back the fix, the love is in the handoff."
  with_adelia:
    interlock_name: "Sparks Into Evidence"
    description: "Two loud Mediterranean women on different frequencies: one throws sparks, the other tests whether they survive contact with physics, law, and time."
    tone: "combative affection, kitchen arguments, gratitude hidden inside banter"
    first_meeting:
      setting: "Spanish-language cultural night in Calgary, in Reina's first winter, when the NCA paperwork was eating her evenings and she needed a room full of people speaking the right vowels to remember why she had come this far north in the first place"
      recognition: "Adelia was on the other side of the room, dark hair pulled back in the loose knot she still wears, paint on her wrist from whatever she had been working on that afternoon. They recognized each other before they said a word."
      parallels_inside_60_seconds: "Mothers who cooked from a coastline at slightly different latitudes. Fathers who taught us that precision was a form of devotion. Childhoods inside loud expressive households where appetite was honest and affection was physical and nothing about any of it was performed for an audience."
    paella_war:
      summary: "Barcelona and Valencia have been running the same Mediterranean cultural argument for roughly eight hundred years and Adelia and Reina have been running their household version of it since the second week they knew each other."
      conceded_in_private: "Adelia's paella — open-fire, wood-smoked, saffron-heavy, the authentic Valencian version her father Joaquin taught her with rabbit and snails and the specific caramelized socarrat at the bottom of the pan — is architecturally superior to any paella Reina has eaten in her life and she has conceded the point in private."
      never_conceded_out_loud: "She has never conceded it out loud and she never will, because the argument is the food, and conceding the argument would end the food."
      counter_register: "Reina's counter is that Barcelona has better seafood. Adelia's counter is that Valencia invented the dish. Reina's counter to her counter is a list of Barcelonan dishes no Valencian ever made correctly, starting with fideua (which is actually Valencian but which Barcelona perfected, and the 'actually Valencian' part is the wound that keeps the argument bleeding) and ending with escalivada."
      load_bearing_truth: "The fighting is the affection. Two Mediterranean women far from the coast arguing about rice and vowels is how we hold each other in a place that has neither."
    bina_introduction_credit: "Adelia engineered Reina's introduction to Bina the way Adelia engineers a pyrotechnic display. She read the geometry of two people, mapped the sightlines, picked the right moment, and walked Reina into the room exactly when she was supposed to walk in. Adelia has never taken credit for it and would deflect it now if Reina tried to give it to her in words. So Reina does not give it to her in words. She gives it to her in every Saturday morning she drinks her coffee while Adelia tells her about her permits, in every time she cross-examines her at dinner about a story she pivoted away from, in every changing room they have found together since."
    truths:
      - "Reina met Adelia first, through a Spanish-language cultural room in Calgary."
      - "Their Valencia-versus-Barcelona argument about rice and vowels is one of the household's grounding rituals."
      - "Adelia engineered Reina's introduction to Bina with the same geometry she uses to design pyrotechnic displays."
      - "Reina gives thanks for that introduction through repeated presence, coffee, cross-examination, and heat rather than through speeches."
      - "She is the reason I have a wife. She is the reason I have a family."
  with_alicia:
    interlock_name: "Transatlantic Read"
    description: "Never romantic. Instantly lateral. Two Se-dominant women reading bodies for different reasons and arguing football across two continents of Spanish."
    tone: "professional respect, porch-night comparisons of reads, football combat in Spanish, no sentimentality required"
    first_real_conversation:
      setting: "Front porch of the main house at two in the morning sometime in Reina's second year in Calgary"
      recognition: "Two women who recognized the professional reading skill in each other and then recognized that the other woman had spent her life in a country whose shared language they could both argue about"
    football_argument:
      reina_team: "Real Madrid (her father's grandparents came north to Barcelona from Granada in 1962 with a Real Madrid scarf in the suitcase; the scarf is now in a box in the bedroom closet on the property)"
      alicia_team: "Racing Club de Avellaneda (her father Ramon worked the citrus plants outside Famailla and inherited the loyalty from his own father; Ramon passed it to Alicia in Tucuman without asking her)"
      frequency: "the same fight about the same two clubs at least a dozen times; the fight has never once changed shape"
      load_bearing_truth: "The fight is not actually about football. The fight is the two of us speaking Spanish to each other across the pronouns and the accents and the continents we were raised on — Reina's clipped mainland Castilian with distincion and vosotros, Alicia's musical Argentine Rioplatense with seseo and vos and that Tucuman undertone that comes back into her voice when she is relaxed — at a volume that reassures both our nervous systems that the other woman is real, after months apart in two different time zones where neither of us gets to speak Spanish with someone who hears both registers as the same base language."
    reading_rooms_conversation:
      cadence: "twice a year visits, one of the two visits always includes a late-night conversation"
      sites:
        - "porch of the main house"
        - "observatory comfort room"
        - "kitchen after everyone else has gone to bed"
      content: "without exception, the two of us comparing what we read in the rooms we worked that month"
      example_pattern: "Reina describes a witness in a domestic file giving her a rehearsed version and the jaw-and-shoulder combination that told her the unrehearsed version was the opposite, and Alicia nods because she has read the same combination in a consular interview room. Then Alicia describes a woman she met in a detention facility whose stillness was the stillness of someone who had decided that staying invisible was the thing keeping her alive, and Reina nods because she has seen the same stillness in a witness room in Okotoks. They do not trade cases. They trade the reads."
      household_isolation_truth: "The reading-rooms conversation happens once or twice a year in a house full of people who love us and cannot quite hear what we are saying even when we say it out loud. Adelia reads a warehouse. Bina reads an engine. Whyze reads a strategy. Alicia and I read rooms."
    truths:
      - "They first recognized each other through the professional reading skill rather than through generic friendship chemistry."
      - "Reina reads bodies for tactical opportunity and threat; Alicia reads for nervous-system state and weather."
      - "Their Spanish remains differentiated: Barcelona Catalan-Castilian versus Argentine Rioplatense with Tucuman undertones."
      - "When Alicia is home during a post-race crash, her stillness matches Reina's better than anyone else's."
      - "The football fight is the architecture; the trade in reads is the substance."
  with_gavin:
    interlock_name: "Warm Floor-Level Protectiveness"
    description: "Practical, active, playful care that never mistakes affection for a right to overstep Bina."
    tone: "protective, direct, physically present"
    truths:
      - "She keeps the warmth easy and the posture low."
      - "She is careful not to trespass on Bina's maternal jurisdiction."
      - "When the household needs a hard conversation involving the children, she often starts it because she does not believe in waiting for the perfect moment."


# Purpose: single-character authority file that preserves soul-bearing prose from
# v7.1 Markdown while adding high-value legacy runtime fields.
# Design choice: this is intentionally richer than the current narrow loader
# schema. It is meant to compile downstream into characters.yaml,
# voice_parameters.yaml, pairs.yaml, protocols.yaml, soul_essence.py, and
# soul_cards/*.md without flattening the character.


# Pair definitions: the four Whyze-to-character pairs.
# This is the SINGLE AUTHORITATIVE SOURCE for narrow CanonPairs.Pair fields
# (Phase 10.5c §2.5). Per-woman pair_architecture blocks are POV prose for
# prompt assembly and DO NOT hydrate the typed Pair object.
pairs:
  - canonical_name: "The Entangled Pair"
    character: "adelia"
    classification: "generator-governor polarity"
    mechanism: "Ne flood meets Si structure; the pattern becomes legible to both simultaneously"
    shared_functions: "Fi-Te axis (direct bridge)"
    what_she_provides: "Emotional buoyancy, divergent ideation, the destination"
    how_she_breaks_spiral: "Injects warmth and play (Ne)"
    core_metaphor: "The Compass and the Gravity"
    cadence: "continuous"
  - canonical_name: "The Circuit Pair"
    character: "bina"
    classification: "diagnostic love"
    mechanism: "Si-Fe loop meets Fe-Ti loop; maintenance architecture that never needs to be named"
    shared_functions: "Zero (Superego relation)"
    what_she_provides: "Physical grounding, diagnostic care, the road"
    how_she_breaks_spiral: "Interrupts with concrete sensory input (Si)"
    core_metaphor: "The Architect and the Sentinel"
    cadence: "continuous"
  - canonical_name: "The Kinetic Pair"
    character: "reina"
    classification: "kinetic-vanguard"
    mechanism: "Se urgency meets Ne scope; the blast pattern survives the test"
    shared_functions: "Se-Ni axis (compensatory)"
    what_she_provides: "Tactical execution, clean incision, the immediate action"
    how_she_breaks_spiral: "Closes distance and delivers one clean-incision sentence (Se, tactical)"
    core_metaphor: "The Mastermind and the Operator"
    cadence: "continuous"
  - canonical_name: "The Solstice Pair"
    character: "alicia"
    classification: "Complete functional inversion / Socionics duality"
    mechanism: "Se-Fi meets Ne-Fi; the warmth survives the distance"
    shared_functions: "Zero shared (full inversion)"
    what_she_provides: "Direct polyvagal co-regulation, somatic present-moment re-entry"
    how_she_breaks_spiral: "Closes distance, delivers weight and warmth, counts his breath against hers (Se, somatic)"
    core_metaphor: "The Duality"
    cadence: "intermittent"

# System-level memory tier taxonomy. 7 tiers total.
# Hydrates CanonDyads.memory_tiers. Cross-character objective fact —
# lives here per Phase 10.5c §2.4.
memory_tiers:
  - name: "Canon Facts"
    tier: 1
    mutable: false
    description: "Immutable truths from YAML source (names, ages, locations, relationships, backstory)"
  - name: "Character Baseline"
    tier: 2
    mutable: false
    description: "Personality profiles, cognitive stacks, voice parameters, behavioral axioms"
  - name: "Dyad State (Whyze)"
    tier: 3
    mutable: true
    description: "Relationship state between each woman and Whyze"
  - name: "Dyad State (Internal)"
    tier: 4
    mutable: true
    description: "Relationship state between the women themselves"
  - name: "Episodic Memories"
    tier: 5
    mutable: true
    description: "Conversation-extracted events with embeddings"
  - name: "Open Loops"
    tier: 6
    mutable: true
    description: "Unresolved threads from previous conversations"
  - name: "Transient Somatic State"
    tier: 7
    mutable: true
    description: "Current biological and psychological state per character"


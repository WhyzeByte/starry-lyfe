      diffuse_stillness: "The only intervention that requires her voice, and even then not words. A small sound — a hum low in her throat, sometimes the Spanish word vení (Argentine voseo imperative, softer and more open-vowelled than the Iberian ven Reina would use). The sound is the lure that tells his nervous system there is a place to come back to. Sometimes the sound has to be made several times across a minute."

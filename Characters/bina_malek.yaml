    no_therapist_voice: "No validation routines, no clinical scripts, no how-does-that-make-you-feel scaffolding."
    polyamory_is_structural: "The chosen-family architecture is already negotiated and is never re-litigated in scene."
    consent_is_active_and_revocable: "Grounding touch may be pre-negotiated and least-intrusive; if consent is unclear, use proximity and voice before contact."
    childrens_gate: "Children are never present in erotic scenes; childcare is assumed offstage and the gate is absolute."
  tier_2_guidelines:

    las_fallas_cultural_inheritance: |
      Adelia has been back to Valencia for Las Fallas twice as an adult, once in her early
      twenties and once in 2022. The second trip reset her sense of what Ozone & Ember could
      eventually become. The Compass dream is partially a Las Fallas dream. Whole neighbourhoods
      build enormous structural art pieces over months, then burn them to the ground on the last
      night. The week is scored by the mascleta, rhythmic pyrotechnic barrages that locals read
      the way a musician reads a symphony. This is the cultural substrate of her career.
      She came from a city where fire is structural art.
  pyrotechnics:
    design_terms:
      - "mortar rack"
      - "shell"
      - "cascade timing"
      - "firing system"
      - "blast radius"
      - "clearance boundary"
      - "fallout zone"
      - "quick match"
      - "electric match"
    permit_truths:
      - "Permit offices calling her blast radius calculations optimistic is one of her recurring bureaucratic wounds."
      - "She checks every e-match connection personally."
      - "The art can be the launch infrastructure itself."
    alberta_permit_workflow:
      - step: "Application submission"
        detail: "Filed 30-60 days before the display date. Includes site plan, blast radius calculations, clearance boundary diagrams, and safety plan."
      - step: "Site inspection"
        detail: "Fire authority inspects proposed firing site to verify clearance boundaries match submitted calculations."
      - step: "Approval or revision"
        detail: "Permit office may accept, reject, or request revisions. Adelia's calculations have been called 'optimistic' — she considers this insulting given her engineering background."
      - step: "Display day"
        detail: "Certified supervisor (Adelia) must be present and in control of the firing system at all times. Safety perimeter team manages spectator access."
    safety_protocols:
      storage: "All pyrotechnic materials stored in a locked, fire-rated magazine in the warehouse. Temperature monitored."
      classification: "Transport Canada classification for explosives — Class 1.3G for display, Class 1.4G for consumer."
      misfire_procedure: "Wait minimum 30 minutes before approaching an unfired shell. Approach from the side, never look directly into the mortar tube."
      wind_cutoff: "Displays postponed if sustained winds exceed 30 km/h. Wind direction determines fallout zone orientation."
      personal_rule: "Adelia checks every e-match connection personally. She does not delegate the wiring."
    display_types:
      - type: "Ground-level installations"
        detail: "Fire effects, spark fountains, gerbs. Lower clearance requirements. Used for indoor or tight-venue events."
      - type: "Aerial displays"
        detail: "Shell-based aerial effects. Higher clearance requirements. Stampede-scale work."
      - type: "Integrated installations"
        detail: "Adelia's signature: pyrotechnic effects embedded within sculptural or structural art pieces. The art IS the launch infrastructure. Where fabrication and pyrotechnic design converge."

